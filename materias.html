<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lista de Materias</title>
</head>

<body>
    <h1>Lista de Materias</h1>
    <table border="1" id="tabla-materias">
        <thead>
            <tr>
                <th>Nro</th>
                <th>Sigla</th>
                <th>Nombre</th>
                <th>Total Horas</th>
                <th>Auxiliar</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        async function leerExcel() {
            const response = await fetch('Base_Datos_Universidad.xlsx');
            const data = await response.arrayBuffer();
            const workbook = XLSX.read(data);

            // Leer la segunda hoja (Materias)
            const nombreHoja = workbook.SheetNames[1];
            const hoja = workbook.Sheets[nombreHoja];
            const filas = XLSX.utils.sheet_to_json(hoja);

            const tbody = document.querySelector('#tabla-materias tbody');
            filas.forEach(fila => {
                const tr = `<tr>
                    <td>${fila['Nro']}</td>
                    <td>${fila['Sigla']}</td>
                    <td>${fila['Nombre']}</td>
                    <td>${fila['Total Horas']}</td>
                    <td>${fila['Auxiliar']}</td>
                </tr>`;
                tbody.innerHTML += tr;
            });
        }
        leerExcel();
    </script>
</body>

</html>
